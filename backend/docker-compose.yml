services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    volumes:
      - ../frontend/build/web:/usr/share/nginx/html:ro

  birdnet:
    build:
      context: ./birdnet-service

  audio-service:
    build:
      context: .
      dockerfile: audio-service/Dockerfile
    ports:
      - "8087:8087"
    env_file:
      - .env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      BIRDNET_URL: http://birdnet:5000
    depends_on:
      - birdnet

  geo-service:
    build:
      context: .
      dockerfile: geo-service/Dockerfile
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker


  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  photo-service:
    build:
      context: .
      dockerfile: photo-service/Dockerfile
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  # ROTERAS OCH LÄGGS I .ENV SEN!!
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
