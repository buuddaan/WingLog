server.port=8080
spring.application.name=api-gateway

#Detta sðtter base/context-path till Gatway:en till "/gateway" /EF
server.servlet.context-path=/gateway
# Stðng av Gatewayens egen fil-tolkning sÍ den skickar vidare filen or—rd
spring.servlet.multipart.enabled=false
# H—j grðnsen f—r hur mycket rÍdata (t.ex. bilder) som fÍr passera, vet inte om detta funkar....
server.tomcat.max-http-form-post-size=5MB

# Plockat bort dessa och brutit ut till CorsConfig /EF
spring.profiles.active=local
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
